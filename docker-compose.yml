services:
  hospital-ai-education-demo:
    build: .
    image: hospital-ai-education-demo:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-30232}:8080"
    environment:
      PORT: "8080"
      LLM_PROXY_BASE_URL: "${LLM_PROXY_BASE_URL:-https://llm-proxy.densematrix.ai}"
      LLM_PROXY_KEY: "${LLM_PROXY_KEY}"
      LLM_MODEL: "${LLM_MODEL:-gemini-3-flash-preview}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
      GOOGLE_GENERATIVE_AI_API_KEY: "${GOOGLE_GENERATIVE_AI_API_KEY}"
      GEMINI_VIDEO_BASE_URL: "${GEMINI_VIDEO_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}"
      GEMINI_VIDEO_DOWNLOAD_BASE_URL: "${GEMINI_VIDEO_DOWNLOAD_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}"
      GEMINI_VIDEO_MODEL: "${GEMINI_VIDEO_MODEL:-veo-3.1-generate-preview}"
      GEMINI_VIDEO_DURATION: "${GEMINI_VIDEO_DURATION:-8}"
      GEMINI_VIDEO_RESOLUTION: "${GEMINI_VIDEO_RESOLUTION:-720p}"
      APIYI_KEY: "${APIYI_KEY}"
      APIYI_BASE_URL: "${APIYI_BASE_URL:-https://api.apiyi.com/v1}"
      APIYI_VIDEO_MODEL: "${APIYI_VIDEO_MODEL:-veo-3.1-fast}"
      JXINCM_API_KEY: "${JXINCM_API_KEY}"
      JXINCM_BASE_URL: "${JXINCM_BASE_URL:-https://api.jxincm.cn}"
      JXINCM_VIDEO_MODEL: "${JXINCM_VIDEO_MODEL:-sora-2-pro}"
      JXINCM_VIDEO_DURATION: "${JXINCM_VIDEO_DURATION:-15}"
      EXPOSE_LOCAL_VIDEO: "${EXPOSE_LOCAL_VIDEO:-false}"
    volumes:
      - hospital-ai-education-generated:/app/generated

volumes:
  hospital-ai-education-generated:
